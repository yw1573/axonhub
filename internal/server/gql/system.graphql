
input InitializeSystemInput {
  ownerEmail: String!
  ownerPassword: String!
  ownerFirstName: String!
  ownerLastName: String!
  brandName: String!
}

type InitializeSystemPayload {
  success: Boolean!
  message: String!
  user: User
  token: String
}

type SystemStatus {
  isInitialized: Boolean!
}

type BrandSettings {
  brandName: String
  brandLogo: String
}

type StoragePolicy {
  storeChunks: Boolean!
  livePreview: Boolean!
  storeRequestBody: Boolean!
  storeResponseBody: Boolean!
  cleanupOptions: [CleanupOption!]!
}

type CleanupOption {
  resourceType: String!
  enabled: Boolean!
  cleanupDays: Int!
}

input UpdateBrandSettingsInput {
  brandName: String
  brandLogo: String
}

input UpdateStoragePolicyInput {
  storeChunks: Boolean
  livePreview: Boolean
  storeRequestBody: Boolean
  storeResponseBody: Boolean
  cleanupOptions: [CleanupOptionInput!]
}

input CleanupOptionInput {
  resourceType: String!
  enabled: Boolean!
  cleanupDays: Int!
}

type AutoDisableChannelStatus {
  status: Int!
  times: Int!
}

type AutoDisableChannel {
  enabled: Boolean!
  statuses: [AutoDisableChannelStatus!]!
}

type AutoDisableAPIKeyStatus {
  status: Int!
  times: Int!
}

type AutoDisableAPIKey {
  enabled: Boolean!
  statuses: [AutoDisableAPIKeyStatus!]!
}

type WebhookTarget {
  name: String!
  enabled: Boolean!
  url: String!
  proxy: ProxyConfig
  timeoutMs: Int!
  headers: [HeaderEntry!]!
  body: String!
}

input WebhookTargetInput {
  name: String!
  enabled: Boolean!
  url: String!
  proxy: ProxyConfigInput
  timeoutMs: Int!
  headers: [HeaderEntryInput!]
  body: String!
}

type WebhookSubscription {
  event: String!
  targetNames: [String!]!
}

input WebhookSubscriptionInput {
  event: String!
  targetNames: [String!]!
}

type WebhookNotifierConfig {
  targets: [WebhookTarget!]!
  subscriptions: [WebhookSubscription!]!
}

input WebhookNotifierConfigInput {
  targets: [WebhookTargetInput!]
  subscriptions: [WebhookSubscriptionInput!]
}

type RetryPolicy {
  maxChannelRetries: Int!
  maxSingleChannelRetries: Int!
  retryDelayMs: Int!
  loadBalancerStrategy: String!
  enabled: Boolean!
  autoDisableChannel: AutoDisableChannel!
  emptyResponseDetection: Boolean!
  upstreamErrorPolicy: UpstreamErrorPolicy!
}

type UpstreamErrorPolicy {
  mode: String!
  customMessage: String!
}

input UpstreamErrorPolicyInput {
  mode: String
  customMessage: String
}

input AutoDisableChannelStatusInput {
  status: Int!
  times: Int!
}

input AutoDisableChannelInput {
  enabled: Boolean
  statuses: [AutoDisableChannelStatusInput!]
}

input UpdateRetryPolicyInput {
  maxChannelRetries: Int
  maxSingleChannelRetries: Int
  retryDelayMs: Int
  loadBalancerStrategy: String
  enabled: Boolean
  autoDisableChannel: AutoDisableChannelInput
  emptyResponseDetection: Boolean
  upstreamErrorPolicy: UpstreamErrorPolicyInput
}

enum QuotaEnforcementMode {
  EXHAUSTED_ONLY
  DE_PRIORITIZE
}

type QuotaEnforcementSettings {
  enabled: Boolean!
  mode: QuotaEnforcementMode!
}

input UpdateQuotaEnforcementSettingsInput {
  enabled: Boolean
  mode: QuotaEnforcementMode
}

type SystemModelSettings {
  fallbackToChannelsOnModelNotFound: Boolean!
  queryAllChannelModels: Boolean!
  defaultModelAPIIncludeAll: Boolean!
  autoReasoningEffort: Boolean!
}

input UpdateSystemModelSettingsInput {
  fallbackToChannelsOnModelNotFound: Boolean
  queryAllChannelModels: Boolean
  defaultModelAPIIncludeAll: Boolean
  autoReasoningEffort: Boolean
}

input UpdateDefaultDataStorageInput {
  dataStorageID: ID!
}

type SystemModelSettingOnboarding {
  onboarded: Boolean!
  completedAt: Time
}

type AutoDisableChannelOnboarding {
  onboarded: Boolean!
  completedAt: Time
}

type OnboardingInfo {
  onboarded: Boolean!
  completedAt: Time
  systemModelSetting: SystemModelSettingOnboarding
  autoDisableChannel: AutoDisableChannelOnboarding
}

input CompleteOnboardingInput {
  dummy: String
}

input CompleteSystemModelSettingOnboardingInput {
  dummy: String
}

input CompleteAutoDisableChannelOnboardingInput {
  dummy: String
}

enum ProbeFrequency {
  ONE_MINUTE
  FIVE_MINUTES
  THIRTY_MINUTES
  ONE_HOUR
}

enum AutoSyncFrequency {
  ONE_HOUR
  SIX_HOURS
  ONE_DAY
}

type ChannelProbeSetting {
  enabled: Boolean!
  frequency: ProbeFrequency!
}

type ChannelModelAutoSyncSetting {
  frequency: AutoSyncFrequency!
}

type SystemChannelSettings {
  probe: ChannelProbeSetting!
  autoSync: ChannelModelAutoSyncSetting!
}

input UpdateChannelProbeSettingInput {
  enabled: Boolean!
  frequency: ProbeFrequency!
}

input UpdateChannelModelAutoSyncSettingInput {
  frequency: AutoSyncFrequency!
}

input UpdateSystemChannelSettingsInput {
  probe: UpdateChannelProbeSettingInput
  autoSync: UpdateChannelModelAutoSyncSettingInput
}

type SystemGeneralSettings {
  currencyCode: String!
  timezone: String!
}

input UpdateSystemGeneralSettingsInput {
  currencyCode: String
  timezone: String
}

type VideoStorageSettings {
  enabled: Boolean!
  dataStorageID: Int!
  scanIntervalMinutes: Int!
  scanLimit: Int!
}

input UpdateVideoStorageSettingsInput {
  enabled: Boolean
  dataStorageID: Int
  scanIntervalMinutes: Int
  scanLimit: Int
}
type UserAgentPassThroughSettings {
  enabled: Boolean!
}

input UpdateUserAgentPassThroughSettingsInput {
  enabled: Boolean!
}

type PassThroughSettings {
  enabled: Boolean!
}

input UpdatePassThroughSettingsInput {
  enabled: Boolean!
}


type ProxyPreset {
  name: String
  url: String!
  username: String
  password: String
}

input SaveProxyPresetInput {
  name: String
  url: String!
  username: String
  password: String
}

extend type Mutation {
  updateBrandSettings(input: UpdateBrandSettingsInput!): Boolean!
  updateStoragePolicy(input: UpdateStoragePolicyInput!): Boolean!
  updateRetryPolicy(input: UpdateRetryPolicyInput!): Boolean!
  updateWebhookNotifierConfig(input: WebhookNotifierConfigInput!): Boolean!
  updateSystemModelSettings(input: UpdateSystemModelSettingsInput!): Boolean!
  updateDefaultDataStorage(input: UpdateDefaultDataStorageInput!): Boolean!
  completeOnboarding(input: CompleteOnboardingInput!): Boolean!
  completeSystemModelSettingOnboarding(input: CompleteSystemModelSettingOnboardingInput!): Boolean!
  completeAutoDisableChannelOnboarding(input: CompleteAutoDisableChannelOnboardingInput!): Boolean!
  updateSystemChannelSettings(input: UpdateSystemChannelSettingsInput!): Boolean!
  updateSystemGeneralSettings(input: UpdateSystemGeneralSettingsInput!): Boolean!
  updateVideoStorageSettings(input: UpdateVideoStorageSettingsInput!): Boolean!
  updateQuotaEnforcementSettings(input: UpdateQuotaEnforcementSettingsInput!): Boolean!
  checkProviderQuotas: Boolean!
  triggerGcCleanup: Boolean!
  saveProxyPreset(input: SaveProxyPresetInput!): Boolean!
  deleteProxyPreset(url: String!): Boolean!
  updateUserAgentPassThroughSettings(input: UpdateUserAgentPassThroughSettingsInput!): Boolean!
  updatePassThroughSettings(input: UpdatePassThroughSettingsInput!): Boolean!
}

type SystemVersion {
  version: String!
  commit: String!
  buildTime: String!
  goVersion: String!
  platform: String!
  uptime: String!
}

type VersionCheck {
  currentVersion: String!
  latestVersion: String!
  hasUpdate: Boolean!
  releaseUrl: String!
}

enum DiagnosticsTarget {
  CHANNEL_CACHE
}

input GetCacheDiagnosticsInput {
  targets: [DiagnosticsTarget!]
}

input ClearCacheInput {
  targets: [DiagnosticsTarget!]
}

type GetCacheDiagnosticsPayload {
  fileName: String!
  content: String!
  targets: [DiagnosticsTarget!]!
}

type ClearCachePayload {
  success: Boolean!
  message: String!
  targets: [DiagnosticsTarget!]!
}

extend type Query {
  systemStatus: SystemStatus!
  brandSettings: BrandSettings!
  storagePolicy: StoragePolicy!
  retryPolicy: RetryPolicy!
  webhookNotifierConfig: WebhookNotifierConfig!
  systemModelSettings: SystemModelSettings!
  defaultDataStorageID: ID
  onboardingInfo: OnboardingInfo
  systemVersion: SystemVersion!
  checkForUpdate: VersionCheck!
  systemChannelSettings: SystemChannelSettings!
  systemGeneralSettings: SystemGeneralSettings!
  videoStorageSettings: VideoStorageSettings!
  quotaEnforcementSettings: QuotaEnforcementSettings!
  proxyPresets: [ProxyPreset!]!
  userAgentPassThroughSettings: UserAgentPassThroughSettings!
  passThroughSettings: PassThroughSettings!
  getCacheDiagnostics(input: GetCacheDiagnosticsInput): GetCacheDiagnosticsPayload!
}

extend type Mutation {
  clearCache(input: ClearCacheInput!): ClearCachePayload!
}
